<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnalIQstaff · v1.1 · Operaciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ========================================================
       RESET & VARIABLES GLOBALES
    ======================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Paleta principal */
      --bg-void:        #060710;
      --bg-surface:     rgba(10, 12, 26, 0.75);
      --glass:          rgba(255,255,255,0.035);
      --glass-hover:    rgba(255,255,255,0.06);
      --border:         rgba(255,255,255,0.07);
      --border-strong:  rgba(255,255,255,0.13);

      /* Acentos */
      --cyan:    #00d4ff;
      --blue:    #4d8eff;
      --purple:  #a855f7;
      --amber:   #f59e0b;
      --green:   #10b981;
      --red:     #ef4444;
      --pink:    #ff6b8a;

      /* Texto */
      --t1: #eef0ff;
      --t2: #7b83a8;
      --t3: #38405e;

      /* Tipografía */
      --sans:  'DM Sans', system-ui, sans-serif;
      --serif: 'DM Serif Display', Georgia, serif;
      --mono:  'DM Mono', 'Courier New', monospace;

      /* Radio */
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 18px;
      --r-xl: 22px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--bg-void);
      color: var(--t1);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    /* ========================================================
       FONDO: AURORA + DOT GRID
    ======================================================== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 75% 55% at 15% 5%,  rgba(0, 80, 200, 0.13) 0%, transparent 65%),
        radial-gradient(ellipse 60% 70% at 85% 95%, rgba(100, 30, 200, 0.09) 0%, transparent 65%),
        radial-gradient(ellipse 45% 35% at 65% 18%, rgba(0, 212, 255, 0.06) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ========================================================
       HEADER
    ======================================================== */
    .app-header {
      position: relative;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 22px;
      height: 60px;
      background: rgba(6, 7, 16, 0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .app-header::after {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent);
      pointer-events: none;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo-analiq {
      font-family: var(--serif);
      font-size: 21px;
      color: var(--t1);
    }
    .logo-staff {
      font-family: var(--serif);
      font-size: 21px;
      font-style: italic;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .version-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      background: rgba(0,212,255,0.07);
      border: 1px solid rgba(0,212,255,0.18);
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 9.5px;
      color: var(--cyan);
      letter-spacing: 0.6px;
      white-space: nowrap;
    }

    .hdr-sep {
      width: 1px;
      height: 28px;
      background: var(--border-strong);
      flex-shrink: 0;
    }

    .hdr-kpis {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .kpi-chip {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .kpi-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 7px var(--green);
      animation: pulse-glow 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-glow {
      0%,100% { opacity: 1; box-shadow: 0 0 7px var(--green); }
      50%      { opacity: 0.5; box-shadow: 0 0 14px var(--green); }
    }

    .kpi-label {
      font-size: 10px;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .kpi-value {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--cyan);
      transition: all 0.35s ease;
      min-width: 38px;
    }

    .coverage-bar-wrap {
      width: 72px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .coverage-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      border-radius: 3px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 6px rgba(0,212,255,0.5);
    }

    .hdr-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-hdr {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--t2);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-hdr:hover {
      background: var(--glass-hover);
      color: var(--t1);
      border-color: var(--border-strong);
    }
    .btn-hdr.primary {
      background: rgba(0,212,255,0.09);
      border-color: rgba(0,212,255,0.25);
      color: var(--cyan);
    }
    .btn-hdr.primary:hover {
      background: rgba(0,212,255,0.16);
    }

    /* ========================================================
       MAIN: 2 COLUMNAS
    ======================================================== */
    .app-main {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 43% 57%;
      overflow: hidden;
    }

    /* ========================================================
       PANELES
    ======================================================== */
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-hdr {
      flex-shrink: 0;
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-title {
      font-family: var(--serif);
      font-size: 17px;
      color: var(--t1);
      line-height: 1.1;
    }

    .panel-sub {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 1px;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--t3) transparent;
    }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--t3); border-radius: 2px; }

    .panel-badge {
      padding: 2px 9px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--t2);
      margin-left: auto;
    }

    /* ========================================================
       PANEL IZQUIERDO: ROSTER
    ======================================================== */
    .roster-panel {
      border-right: 1px solid var(--border);
    }

    /* ========================================================
       HINT DE SELECCIÓN
    ======================================================== */
    .selection-hint {
      flex-shrink: 0;
      padding: 9px 18px;
      background: rgba(0,212,255,0.06);
      border-top: 1px solid rgba(0,212,255,0.18);
      font-size: 11px;
      color: var(--cyan);
      text-align: center;
      display: none;
      animation: fade-in 0.2s ease;
    }
    .selection-hint.visible { display: block; }

    /* ========================================================
       GRILLA DE CROMOS
    ======================================================== */
    .cromo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
    }

    /* ========================================================
       CROMO CARD
    ======================================================== */
    .cromo {
      position: relative;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.28s ease, border-color 0.25s ease;
      user-select: none;
      animation: fade-in 0.3s ease both;
    }

    .cromo:nth-child(1) { animation-delay: 0.04s; }
    .cromo:nth-child(2) { animation-delay: 0.08s; }
    .cromo:nth-child(3) { animation-delay: 0.12s; }
    .cromo:nth-child(4) { animation-delay: 0.16s; }
    .cromo:nth-child(5) { animation-delay: 0.20s; }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cromo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 35%,
        rgba(255,255,255,0.05) 50%,
        transparent 65%
      );
      background-size: 200% 100%;
      background-position: 200% 0;
      transition: background-position 0.55s ease;
      pointer-events: none;
      border-radius: inherit;
    }
    .cromo:hover::after { background-position: -100% 0; }

    .cromo:hover {
      transform: translateY(-3px);
      border-color: var(--border-strong);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    .cromo.selected {
      border-color: var(--cyan);
      box-shadow:
        0 0 0 1px var(--cyan),
        0 0 24px rgba(0,212,255,0.2),
        0 8px 30px rgba(0,0,0,0.4);
      transform: translateY(-2px);
    }

    .cromo-accent-bar {
      height: 3px;
      background: var(--c-accent, var(--cyan));
      transition: opacity 0.3s;
    }
    .cromo.selected .cromo-accent-bar {
      background: linear-gradient(90deg, var(--cyan), var(--blue));
      box-shadow: 0 0 8px rgba(0,212,255,0.6);
    }

    .cromo-num {
      position: absolute;
      top: 10px;
      right: 11px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--t3);
      letter-spacing: 0.5px;
    }

    .cromo-body {
      padding: 14px 13px 12px;
    }

    .cromo-avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 11px;
    }

    .cromo-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      background: var(--c-avatar-bg);
      border: 2px solid var(--c-avatar-border);
      box-shadow: var(--c-avatar-glow);
      position: relative;
      transition: box-shadow 0.3s;
    }

    .cromo.selected .cromo-avatar {
      box-shadow: var(--c-avatar-glow), 0 0 20px rgba(0,212,255,0.35);
    }

    .cromo-sel-dot {
      display: none;
      position: absolute;
      top: -3px;
      right: -3px;
      width: 14px;
      height: 14px;
      background: var(--cyan);
      border-radius: 50%;
      border: 2px solid var(--bg-void);
      box-shadow: 0 0 8px var(--cyan);
      animation: pulse-glow 1s ease-in-out infinite;
    }
    .cromo.selected .cromo-sel-dot { display: block; }

    .cromo-name {
      text-align: center;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--t1);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cromo-cargo {
      text-align: center;
      font-size: 9.5px;
      color: var(--t2);
      margin-bottom: 9px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cromo-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .badge.tip {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.3);
      color: var(--green);
    }
    .badge.armas {
      background: rgba(239,68,68,0.11);
      border: 1px solid rgba(239,68,68,0.28);
      color: var(--red);
    }
    .badge.aeropuertos {
      background: rgba(168,85,247,0.11);
      border: 1px solid rgba(168,85,247,0.28);
      color: var(--purple);
    }

    .cromo-hr {
      height: 1px;
      background: var(--border);
      margin: 0 -13px 10px;
    }

    .cromo-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
    }

    .stat {
      text-align: center;
      padding: 0 2px;
    }
    .stat + .stat {
      border-left: 1px solid var(--border);
    }

    .stat-val {
      font-family: var(--mono);
      font-size: 13.5px;
      font-weight: 500;
      color: var(--t1);
      line-height: 1.1;
      margin-bottom: 2px;
    }
    .stat-val.accent { color: var(--c-accent, var(--cyan)); }

    .stat-lbl {
      font-size: 7.5px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ========================================================
       PANEL DERECHO: SCHEDULER
    ======================================================== */
    .scheduler-panel .panel-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px 18px;
      scrollbar-width: thin;
      scrollbar-color: var(--t3) transparent;
    }

    .date-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 11px 4px 9px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
    }
    .date-badge .db-day {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--t1);
      line-height: 1;
    }
    .date-badge .db-month {
      font-size: 11px;
      color: var(--t1);
      line-height: 1.2;
    }
    .date-badge .db-year {
      font-size: 9px;
      color: var(--t3);
      line-height: 1;
    }

    .puesto-block {
      background: rgba(10,12,26,0.6);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      overflow: hidden;
    }

    .puesto-hdr {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }

    .puesto-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .puesto-icon.aeropuerto {
      background: rgba(168,85,247,0.1);
      border: 1px solid rgba(168,85,247,0.2);
    }
    .puesto-icon.armado {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
    }

    .puesto-info { flex: 1; min-width: 0; }
    .puesto-nombre {
      font-size: 13px;
      font-weight: 600;
      color: var(--t1);
    }
    .puesto-lugar {
      font-size: 10px;
      color: var(--t2);
    }

    .puesto-req-badges {
      display: flex;
      gap: 4px;
    }

    .turnos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }

    /* ========================================================
       SLOT DE TURNO
    ======================================================== */
    .turno-slot {
      background: rgba(6,7,16,0.7);
      padding: 12px;
      min-height: 96px;
      position: relative;
      transition: background 0.2s;
    }

    .turno-slot.empty {
      cursor: pointer;
    }
    .turno-slot.empty:hover {
      background: rgba(0,212,255,0.025);
    }

    /* Slot disponible genérico (pulse cyan) */
    .turno-slot.slot-available {
      animation: slot-pulse 1.8s ease-in-out infinite;
    }
    @keyframes slot-pulse {
      0%,100% { box-shadow: inset 0 0 0 1px rgba(0,212,255,0.07); }
      50%      { box-shadow: inset 0 0 0 1px rgba(0,212,255,0.28); }
    }
    .turno-slot.slot-available:hover {
      box-shadow: inset 0 0 0 1px rgba(0,212,255,0.5);
      background: rgba(0,212,255,0.04);
      animation: none;
    }

    /* Slot COMPATIBLE con el vigilante seleccionado — glow de su color */
    .turno-slot.slot-compatible {
      animation: slot-compat-pulse 1.6s ease-in-out infinite;
    }
    @keyframes slot-compat-pulse {
      0%,100% {
        box-shadow: inset 0 0 0 1px rgba(var(--hl-rgb, 0,212,255), 0.18);
        background: rgba(var(--hl-rgb, 0,212,255), 0.025);
      }
      50% {
        box-shadow: inset 0 0 0 1.5px rgba(var(--hl-rgb, 0,212,255), 0.55),
                    0 0 14px rgba(var(--hl-rgb, 0,212,255), 0.12);
        background: rgba(var(--hl-rgb, 0,212,255), 0.06);
      }
    }
    .turno-slot.slot-compatible:hover {
      animation: none;
      box-shadow: inset 0 0 0 1.5px rgba(var(--hl-rgb, 0,212,255), 0.8),
                  0 0 18px rgba(var(--hl-rgb, 0,212,255), 0.18);
      background: rgba(var(--hl-rgb, 0,212,255), 0.09);
    }

    .turno-hdr-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 5px;
    }

    .turno-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .noche-pip {
      padding: 1px 5px;
      background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.22);
      border-radius: 4px;
      font-size: 8px;
      color: var(--purple);
      font-family: var(--mono);
    }

    .turno-horas {
      font-family: var(--mono);
      font-size: 9.5px;
      color: var(--t3);
      margin-bottom: 8px;
    }

    .slot-empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 7px;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 7px;
      transition: border-color 0.2s, background 0.2s;
    }
    .turno-slot.empty:hover .slot-empty-state,
    .turno-slot.slot-available .slot-empty-state,
    .turno-slot.slot-compatible .slot-empty-state {
      border-color: rgba(var(--hl-rgb, 0,212,255), 0.4);
    }

    .slot-plus {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--t3);
      transition: all 0.2s;
    }
    .turno-slot.empty:hover .slot-plus,
    .turno-slot.slot-available .slot-plus,
    .turno-slot.slot-compatible .slot-plus {
      border-color: rgba(var(--hl-rgb, 0,212,255), 0.5);
      color: rgba(var(--hl-rgb, 0,212,255), 1);
    }
    .slot-empty-txt {
      font-size: 8.5px;
      color: var(--t3);
    }

    /* Mini-cromo asignado */
    .mini-cromo {
      display: flex;
      align-items: center;
      gap: 7px;
      border-radius: 7px;
      padding: 6px 7px;
      transition: background 0.2s;
    }
    .mini-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 500;
      color: #fff;
      flex-shrink: 0;
    }
    .mini-info { flex: 1; min-width: 0; }
    .mini-nombre {
      font-size: 9.5px;
      font-weight: 600;
      color: var(--t1);

<script>
/* ======================================================
   DATOS
====================================================== */
const VIGILANTES = [

  },
  {

    cargo: 'Vigilante de Seguridad',
    iniciales: 'AS',
    color: '#10b981',
    hab: ['tip'],
    fiabilidad: 7.8,
    experiencia: 3,
    trienios: 1,
    salarioBase: 1380.00
  },
  {
    id: 5,
    nombre: 'Miguel Castro',
    cargo: 'Inspector de Servicios',
    iniciales: 'MC',
    color: '#ff6b8a',
    hab: ['tip', 'armas', 'aeropuertos'],
    fiabilidad: 9.7,
    experiencia: 12,
    trienios: 4,
    salarioBase: 1520.00
  }
];

const PUESTOS = [
  {
    id: 'p1',
    nombre: 'Control de Accesos',
    lugar: 'Aeropuerto AENA · Terminal 2',
    emoji: '✈',
    tipo: 'aeropuerto',
    requiere: ['tip', 'aeropuertos'],
    armado: false
  },
  {
    id: 'p2',
    nombre: 'Patrulla Armada',
    lugar: 'Centro Comercial · Planta Principal',
    emoji: '🛡',
    tipo: 'armado',
    requiere: ['tip', 'armas'],
    armado: true
  }
];

const TURNOS = [
  { id: 'manana', label: 'Mañana', horas: '06:00 – 14:00', esNoche: false },
  { id: 'tarde',  label: 'Tarde',  horas: '14:00 – 22:00', esNoche: false },
  { id: 'noche',  label: 'Noche',  horas: '22:00 – 06:00', esNoche: true  }
];

const BADGE_DEF = {
  tip:         { label: '✓ TIP Activa', cls: 'tip' },
  armas:       { label: '⚑ Lic. Armas', cls: 'armas' },
  aeropuertos: { label: '✈ Aeropuertos', cls: 'aeropuertos' }
};

// Etiquetas para badges de alerta de habilitación faltante
const HAB_LABELS = {
  tip:         'TIP Activa',
  armas:       'Lic. Armas',
  aeropuertos: 'Aeropuertos'
};

/* Constantes económicas — Convenio Colectivo Vigilancia España 2026 */
const PLUS_ARMA        = 0.82;   // €/hora — Plus Peligrosidad/Arma
const PLUS_NOCTURNIDAD = 1.52;   // €/hora — Plus Nocturnidad
const HORAS_TURNO      = 8;      // horas por turno estándar
const SS_PATRONAL      = 0.33;   // 33% cotización patronal
const COSTE_HORA_BASE  = 14.50;  // €/hora — coste laboral base estimado
const TRIENIO_MES      = 28.50;  // €/mes por trienio devengado
const DIAS_MES         = 30;     // días para proporcionalizar trienios

/* ======================================================
   ESTADO
====================================================== */
let selectedId = null;  // cromo seleccionado (para asignar)

// Mapa de asignaciones: assignments[puestoId][turnoId] = vigilanteId | null
const assignments = {};
PUESTOS.forEach(p => {
  assignments[p.id] = {};
  TURNOS.forEach(t => { assignments[p.id][t.id] = null; });
});

/* ======================================================
   UTILIDADES
====================================================== */
function getV(id) { return VIGILANTES.find(v => v.id === id); }

function hexRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function fmtEur(n) {
  return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

function countFilled() {
  let n = 0;
  PUESTOS.forEach(p => TURNOS.forEach(t => { if (assignments[p.id][t.id]) n++; }));
  return n;
}

/**
 * Devuelve las habilitaciones que le faltan al vigilante para cubrir el puesto.
 */
function getMissingHabs(v, puesto) {
  return puesto.requiere.filter(h => !v.hab.includes(h));
}

/**
 * Devuelve un Set de vids que tienen asignados más de 1 turno en el cuadrante.
 * Implica exceso de jornada / incumplimiento del descanso de 12h.
 */
function getDoubleShifts() {
  const counts = {};
  PUESTOS.forEach(p => {
    TURNOS.forEach(t => {
      const vid = assignments[p.id][t.id];
      if (vid !== null) counts[vid] = (counts[vid] || 0) + 1;
    });
  });
  return Object.keys(counts)
    .filter(vid => counts[+vid] > 1)
    .map(Number);
}

/**
 * Calcula todos los costes del cuadrante actual en tiempo real.
 */
function calcCuadrante() {
  let turnosAsignados = 0;
  const vigilantesUnicos = new Set();
  const trieniosPorVigilante = {}; // vid → coste diario trienio (calculado 1 sola vez)
  let costeBase     = 0;
  let costeTrienios = 0;
  let plusNoche     = 0;
  let plusArma      = 0;
  let nTurnosNoche  = 0;
  let nTurnosArma   = 0;

  PUESTOS.forEach(p => {
    TURNOS.forEach(t => {
      const vid = assignments[p.id][t.id];
      if (vid === null) return;

      const v = getV(vid);
      turnosAsignados++;
      costeBase += COSTE_HORA_BASE * HORAS_TURNO;

      // Trienio: devengo diario del vigilante (solo 1 vez por vigilante único)
      if (!vigilantesUnicos.has(vid)) {
        vigilantesUnicos.add(vid);
        const costeDiarioTrienio = v.trienios * (TRIENIO_MES / DIAS_MES);
        trieniosPorVigilante[vid] = costeDiarioTrienio;
        costeTrienios += costeDiarioTrienio;
      }

      // Pluses por tipo de turno / puesto
      if (t.esNoche) { plusNoche += PLUS_NOCTURNIDAD * HORAS_TURNO; nTurnosNoche++; }
      if (p.armado)  { plusArma  += PLUS_ARMA        * HORAS_TURNO; nTurnosArma++;  }
    });
  });

  const plusesTotal = plusNoche + plusArma;
  const brutoTotal  = costeBase + costeTrienios + plusesTotal;
  const ssPatronal  = brutoTotal * SS_PATRONAL;
  const costeTotal  = brutoTotal + ssPatronal;

  return {
    turnosAsignados,
    vigilantesUnicos: vigilantesUnicos.size,
    costeBase,
    costeTrienios,
    plusNoche,
    plusArma,
    plusesTotal,
    nTurnosNoche,
    nTurnosArma,
    brutoTotal,
    ssPatronal,
    costeTotal
  };
}

/* ======================================================
   RENDER: CROMOS
====================================================== */
function renderRoster() {
  const grid = document.getElementById('cromo-grid');
  grid.innerHTML = '';

  VIGILANTES.forEach((v, i) => {
    const rgb = hexRgb(v.color);
    const sel = v.id === selectedId;

    const card = document.createElement('div');
    card.className = 'cromo' + (sel ? ' selected' : '');
    card.dataset.id = v.id;

    card.style.cssText = `
      --c-accent: ${v.color};
      --c-avatar-bg: rgba(${rgb},0.16);
      --c-avatar-border: rgba(${rgb},0.38);
      --c-avatar-glow: 0 0 14px rgba(${rgb},0.35);
    `;

    const badgesHTML = v.hab.map(h => {
      const b = BADGE_DEF[h];
      return `<span class="badge ${b.cls}">${b.label}</span>`;
    }).join('');

    card.innerHTML = `
      <div class="cromo-accent-bar"></div>
      <div class="cromo-num">#${String(i+1).padStart(2,'0')}</div>
      <div class="cromo-body">
        <div class="cromo-avatar-wrap">
          <div class="cromo-avatar">
            ${v.iniciales}
            <div class="cromo-sel-dot"></div>
          </div>
        </div>
        <div class="cromo-name">${v.nombre}</div>
        <div class="cromo-cargo">${v.cargo}</div>
        <div class="cromo-badges">${badgesHTML}</div>
        <div class="cromo-hr"></div>
        <div class="cromo-stats">
          <div class="stat">
            <div class="stat-val accent">${v.fiabilidad}</div>
            <div class="stat-lbl">Fiabilidad</div>
          </div>
          <div class="stat">
            <div class="stat-val">${v.experiencia}</div>
            <div class="stat-lbl">Años Exp.</div>
          </div>
          <div class="stat">
            <div class="stat-val">${v.trienios > 0 ? '×' + v.trienios : '–'}</div>
            <div class="stat-lbl">Trienios</div>
          </div>
        </div>
      </div>
    `;

    card.addEventListener('click', () => onCromoClick(v.id));
    grid.appendChild(card);
  });
}

/* ======================================================
   RENDER: SCHEDULER
====================================================== */
function renderScheduler() {
  const body = document.getElementById('scheduler-body');
  body.innerHTML = '';

  PUESTOS.forEach(puesto => {
    const block = document.createElement('div');
    block.className = 'puesto-block';

    const reqBadges = puesto.requiere.map(r => {
      const b = BADGE_DEF[r];
      return `<span class="badge ${b.cls}">${b.label}</span>`;
    }).join('');

    block.innerHTML = `
      <div class="puesto-hdr">
        <div class="puesto-icon ${puesto.tipo}">${puesto.emoji}</div>
        <div class="puesto-info">
          <div class="puesto-nombre">${puesto.nombre}</div>
          <div class="puesto-lugar">${puesto.lugar}</div>
        </div>
        <div class="puesto-req-badges">${reqBadges}</div>
      </div>
      <div class="turnos-grid" id="tgrid-${puesto.id}"></div>
    `;

    body.appendChild(block);

    const tGrid = block.querySelector(`#tgrid-${puesto.id}`);
    TURNOS.forEach(turno => {
      tGrid.appendChild(buildSlot(puesto, turno));
    });
  });
}

/**
 * Construye un slot de turno con lógica completa de:
 * - Glow compatible por color del vigilante seleccionado
 * - Badge de advertencia si hay habilitaciones faltantes
 * - Badge de conflicto de convenio si hay doble turno
 */
function buildSlot(puesto, turno) {
  const vid = assignments[puesto.id][turno.id];
  const hasVigilante = vid !== null;
  const slot = document.createElement('div');
  slot.dataset.puesto = puesto.id;
  slot.dataset.turno  = turno.id;

  // Cabecera común del slot
  const nocheTag = turno.esNoche ? '<span class="noche-pip">🌙</span>' : '';
  const slotHdr = `
    <div class="turno-hdr-row">
      <span class="turno-label">${turno.label}</span>
      ${nocheTag}
    </div>
    <div class="turno-horas">${turno.horas}</div>
  `;

  if (hasVigilante) {
    // ── Slot ocupado ──────────────────────────────────────────
    slot.className = 'turno-slot';

    const v = getV(vid);
    const rgb = hexRgb(v.color);

    // ¿Le faltan habilitaciones para este puesto?
    const missing = getMissingHabs(v, puesto);
    const warnHTML = missing.map(h =>
      `<div class="warn-badge">⚠ Falta ${HAB_LABELS[h]}</div>`
    ).join('');

    // ¿Tiene más de 1 turno asignado? → conflicto de convenio
    const doubles = getDoubleShifts();
    const conflictHTML = doubles.includes(vid)
      ? `<div class="conflict-badge">⚠ Conflicto Convenio · Exceso jornada / Descanso 12h</div>`
      : '';

    slot.innerHTML = `
      ${slotHdr}
      <div class="mini-cromo"
           style="background:rgba(${rgb},0.07);border:1px solid rgba(${rgb},0.2)">
        <div class="mini-avatar"
             style="background:rgba(${rgb},0.2);border:1px solid rgba(${rgb},0.4);color:${v.color}">
          ${v.iniciales}
        </div>
        <div class="mini-info">
          <div class="mini-nombre">${v.nombre}</div>
          <div class="mini-cargo">${v.cargo.split(' ')[0]}</div>
        </div>
        <div class="mini-remove" data-puesto="${puesto.id}" data-turno="${turno.id}">✕</div>
      </div>
      ${warnHTML}
      ${conflictHTML}
    `;

    // Botón de borrar asignación
    slot.querySelector('.mini-remove').addEventListener('click', e => {
      e.stopPropagation();
      onUnassign(puesto.id, turno.id);
    });

  } else {
    // ── Slot vacío ─────────────────────────────────────────────
    let classes = 'turno-slot empty';

    if (selectedId !== null) {
      const sv = getV(selectedId);
      const missing = getMissingHabs(sv, puesto);
      if (missing.length === 0) {
        // Completamente compatible: glow del color del vigilante
        classes += ' slot-compatible';
        slot.style.setProperty('--hl-rgb', hexRgb(sv.color));
      } else {
        // Incompatible (pero sigue siendo asignable para demo)
        classes += ' slot-available';
      }
    }

    slot.className = classes;
    slot.innerHTML = `
      ${slotHdr}
      <div class="slot-empty-state">
        <div class="slot-plus">+</div>
        <div class="slot-empty-txt">Vacío</div>
      </div>
    `;

    slot.addEventListener('click', () => onSlotClick(puesto.id, turno.id));
  }

  return slot;
}

/* ======================================================
   RENDER: PANEL FINANCIERO DEL CUADRANTE (footer)
====================================================== */
function renderFinancialPanel() {
  const footer      = document.getElementById('payroll-footer');
  const titleStrip  = document.getElementById('payroll-title-strip');
  const inner       = document.getElementById('payroll-inner');
  const filled      = countFilled();

  if (filled === 0) {
    footer.classList.remove('visible');
    titleStrip.style.display = 'none';
    inner.innerHTML = '';
    return;
  }

  footer.classList.add('visible');
  titleStrip.style.display = 'flex';

  const data    = calcCuadrante();
  const doubles = getDoubleShifts();

  // Franja de título con alerta opcional
  const alertStripHTML = doubles.length > 0
    ? `<span class="strip-alert">
         ⚠ Exceso jornada: ${doubles.map(vid => getV(vid).nombre.split(' ')[0]).join(', ')}
       </span>`
    : '';

  const now   = new Date();
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const fecha = `${now.getDate()} ${meses[now.getMonth()]} ${now.getFullYear()}`;

  titleStrip.innerHTML = `
    <span class="payroll-title-strip-label">Análisis Económico del Cuadrante</span>
    <span style="color:var(--t3);font-size:9px;font-family:var(--mono)">·</span>
    <span class="payroll-title-strip-name">${fecha}</span>
    ${alertStripHTML}
  `;

  // Coste medio por turno
  const costeMedioTurno = data.turnosAsignados > 0
    ? data.costeTotal / data.turnosAsignados
    : 0;

  inner.innerHTML = `

    <!-- Columna 1: Resumen del cuadrante -->
    <div class="payroll-col">
      <div class="payroll-col-title">Resumen del Cuadrante</div>

      <div class="pay-kpi-row">
        <div class="pay-kpi-dot" style="background:var(--cyan);box-shadow:0 0 5px var(--cyan)"></div>
        <span class="pay-kpi-lbl">Turnos cubiertos</span>
        <span class="pay-kpi-val" style="color:var(--cyan)">${data.turnosAsignados} / ${PUESTOS.length * TURNOS.length}</span>
      </div>

      <div class="pay-kpi-row">
        <div class="pay-kpi-dot" style="background:var(--blue);box-shadow:0 0 5px var(--blue)"></div>
        <span class="pay-kpi-lbl">Agentes desplegados</span>
        <span class="pay-kpi-val">${data.vigilantesUnicos}</span>
      </div>

      <div class="pay-kpi-row">
        <div class="pay-kpi-dot" style="background:var(--purple);box-shadow:0 0 5px var(--purple)"></div>
        <span class="pay-kpi-lbl">Turnos nocturnos</span>
        <span class="pay-kpi-val ${data.nTurnosNoche > 0 ? '' : 'dim'}">${data.nTurnosNoche}</span>
      </div>

      <div class="pay-kpi-row">
        <div class="pay-kpi-dot" style="background:var(--red);box-shadow:0 0 5px var(--red)"></div>
        <span class="pay-kpi-lbl">Turnos armados</span>
        <span class="pay-kpi-val ${data.nTurnosArma > 0 ? '' : 'dim'}">${data.nTurnosArma}</span>
      </div>

      <div class="pay-total-block">
        <div class="pay-total-lbl">Coste medio / turno</div>
        <div class="pay-total-val" style="color:var(--blue);font-size:17px">${fmtEur(costeMedioTurno)}</div>
        <div class="pay-total-sub">Coste empresa por turno asignado</div>
      </div>
    </div>

    <!-- Columna 2: Coste Base + Trienios -->
    <div class="payroll-col">
      <div class="payroll-col-title">Coste Laboral Base / Día</div>

      <div class="pay-row">
        <span class="pay-lbl">${fmtEur(COSTE_HORA_BASE)}/h × 8h × ${data.turnosAsignados} turnos</span>
        <span class="pay-val">${fmtEur(data.costeBase)}</span>
      </div>

      <div class="pay-row">
        <span class="pay-lbl">Trienios devengados (${data.vigilantesUnicos} agente${data.vigilantesUnicos !== 1 ? 's' : ''})</span>
        <span class="pay-val green">+${fmtEur(data.costeTrienios)}</span>
      </div>

      <div class="pay-hr"></div>

      <div class="pay-subtotal-row">
        <span class="pay-subtotal-lbl">Subtotal base</span>
        <span class="pay-subtotal-val">${fmtEur(data.costeBase + data.costeTrienios)}</span>
      </div>

      <div class="pay-total-block">
        <div class="pay-total-lbl">Base garantizada / día</div>
        <div class="pay-total-val" style="color:var(--t1);font-size:17px">${fmtEur(data.costeBase + data.costeTrienios)}</div>
        <div class="pay-total-sub">Sin pluses de convenio</div>
      </div>
    </div>

    <!-- Columna 3: Pluses de Convenio 2026 -->
    <div class="payroll-col">
      <div class="payroll-col-title">Pluses Convenio 2026</div>

      <div class="pay-row">
        <span class="pay-lbl">🌙 Nocturnidad (+${PLUS_NOCTURNIDAD}€/h × ${data.nTurnosNoche * HORAS_TURNO}h)</span>
        <span class="pay-val ${data.plusNoche > 0 ? 'green' : 'dim'}">${data.plusNoche > 0 ? '+' : ''}${fmtEur(data.plusNoche)}</span>
      </div>

      <div class="pay-row">
        <span class="pay-lbl">🛡 Peligrosidad (+${PLUS_ARMA}€/h × ${data.nTurnosArma * HORAS_TURNO}h)</span>
        <span class="pay-val ${data.plusArma > 0 ? 'green' : 'dim'}">${data.plusArma > 0 ? '+' : ''}${fmtEur(data.plusArma)}</span>
      </div>

      <div class="pay-hr"></div>

      <div class="pay-subtotal-row">
        <span class="pay-subtotal-lbl">Total pluses día</span>
        <span class="pay-subtotal-val" style="color:var(--green)">+${fmtEur(data.plusesTotal)}</span>
      </div>

      <div class="pay-total-block">
        <div class="pay-total-lbl">Bruto cuadrante / día</div>
        <div class="pay-total-val" style="color:var(--cyan)">${fmtEur(data.brutoTotal)}</div>
        <div class="pay-total-sub">Base + trienios + pluses</div>
      </div>
    </div>

    <!-- Columna 4: Coste Total Empresa -->
    <div class="payroll-col">
      <div class="payroll-col-title">Coste Total Empresa / Día</div>

      <div class="pay-row">
        <span class="pay-lbl">Bruto cuadrante</span>
        <span class="pay-val">${fmtEur(data.brutoTotal)}</span>
      </div>

      <div class="pay-row">
        <span class="pay-lbl">SS Patronal (33%)</span>
        <span class="pay-val amber">+${fmtEur(data.ssPatronal)}</span>
      </div>

      <div class="pay-hr"></div>

      <div class="pay-total-block">
        <div class="pay-total-lbl">Coste empresa · día</div>
        <div class="pay-total-val" style="color:var(--pink)">${fmtEur(data.costeTotal)}</div>
        <div class="pay-total-sub">Nómina bruta + cotización SS</div>
      </div>
    </div>
  `;
}

/* ======================================================
   RENDER: KPI COBERTURA
====================================================== */
function updateKPI() {
  const filled = countFilled();
  const total  = PUESTOS.length * TURNOS.length; // = 6
  const pct    = Math.round((filled / total) * 100);

  document.getElementById('coverage-pct').textContent   = pct + '%';
  document.getElementById('coverage-bar').style.width   = pct + '%';
  document.getElementById('filled-count').textContent   = filled;

  const dot = document.getElementById('kpi-dot');
  dot.style.background = pct === 100 ? 'var(--green)' : pct > 50 ? 'var(--amber)' : 'var(--red)';
  dot.style.boxShadow  = pct === 100 ? '0 0 7px var(--green)' : pct > 50 ? '0 0 7px var(--amber)' : '0 0 7px var(--red)';
}

/* ======================================================
   MANEJADORES DE EVENTOS
====================================================== */
function onCromoClick(id) {
  selectedId = (selectedId === id) ? null : id;
  renderRoster();
  renderScheduler();
  updateHint();
}

function onSlotClick(puestoId, turnoId) {
  if (!selectedId) return;
  assignments[puestoId][turnoId] = selectedId;
  selectedId = null;

  renderRoster();
  renderScheduler();
  renderFinancialPanel();
  updateKPI();
  updateHint();
}

function onUnassign(puestoId, turnoId) {
  assignments[puestoId][turnoId] = null;
  renderScheduler();
  renderFinancialPanel();
  updateKPI();
}

function clearAll() {
  PUESTOS.forEach(p => TURNOS.forEach(t => { assignments[p.id][t.id] = null; }));
  selectedId = null;
  renderRoster();
  renderScheduler();
  renderFinancialPanel();
  updateKPI();
  updateHint();
}

function updateHint() {
  const hint = document.getElementById('selection-hint');
  if (selectedId) {
    const v = getV(selectedId);
    hint.innerHTML = `↗ <strong>${v.nombre}</strong> seleccionado/a · Slots <span style="color:${v.color}">■ compatibles</span> resaltados en su color · haz clic para asignar`;
    hint.classList.add('visible');
  } else {
    hint.classList.remove('visible');
  }
}

/* ======================================================
   FECHA DE HOY EN EL HEADER
====================================================== */
function setDate() {
  const now    = new Date();
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  document.getElementById('hdr-day').textContent   = now.getDate();
  document.getElementById('hdr-month').textContent = months[now.getMonth()];
  document.getElementById('hdr-year').textContent  = now.getFullYear();
}

/* ======================================================
   INIT
====================================================== */
function init() {
  setDate();
  renderRoster();
  renderScheduler();
  updateKPI();
}

init();
</script>
